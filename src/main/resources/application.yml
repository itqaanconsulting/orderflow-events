server:
  port: 8082

spring:
  application:
    name: orderflow-events
  datasource:
    url: jdbc:postgresql://localhost:5433/orderflow
    username: orderflow
    password: orderflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: orderflow-events
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: nl.itqaanconsulting.orderflow.order
    listener:
      missing-topics-fatal: false

orderflow:
  messaging:
    mode: kafka
  kafka:
    order-processing-topic: order-processing-requests
    consumer-group: orderflow-events

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
