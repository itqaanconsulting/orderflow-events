server:
  port: 8082

spring:
  application:
    name: orderflow-events
  datasource:
    url: jdbc:postgresql://localhost:5433/orderflow
    username: orderflow
    password: orderflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: orderflow-events
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: nl.itqaanconsulting.orderflow.order.messaging
    listener:
      missing-topics-fatal: false

orderflow:
  messaging:
    mode: kafka
  kafka:
    order-processing-topic: order-processing-requests
    dead-letter-topic: order-processing-requests-dlt
    consumer-group: orderflow-events
    retry-interval-ms: 1000
    max-retries: 2

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

info:
  app:
    name: OrderFlow Events
    version: 0.1.0-SNAPSHOT
    description: Event-driven order processing showcase with Kafka and PostgreSQL.
  messaging:
    mode: ${orderflow.messaging.mode}
    order-processing-topic: ${orderflow.kafka.order-processing-topic}
    dead-letter-topic: ${orderflow.kafka.dead-letter-topic}
    consumer-group: ${orderflow.kafka.consumer-group}
